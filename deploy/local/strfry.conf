db = "/data/"

events {
    maxEventSize = 65536
    rejectEventsNewerThanSeconds = 900
    rejectEventsOlderThanSeconds = 94608000
    rejectEphemeralEventsOlderThanSeconds = 60
    ephemeralEventsLifetimeSeconds = 300
    maxNumTags = 2000
    maxTagValSize = 1024
}

relay {
    bind = "0.0.0.0"
    port = 7777
    nofiles = 0

    auth {
        enabled = true
        serviceUrl = "ws://127.0.0.1:7777"
    }

    info {
        name = "Facet local"
        description = "Disposable local Facet development relay"
        pubkey = ""
        self = ""
        contact = ""
        icon = ""
        nips = ""
    }

    writePolicy {
        plugin = "/policy/facet-allowlist.js"
        timeoutSeconds = 10
    }
}
